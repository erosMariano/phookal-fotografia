    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="../../assets/js/casamentos/casal.js"></script>
    <script>
      window.addEventListener("load", () => {
        const cols = document.querySelectorAll(".col");
        const logo = document.querySelector(".transition img");

        const tl = gsap.timeline();

        tl.to(logo, {
          opacity: 0,
          duration: 0.3,
          ease: "power2.in",
        })

          .to(cols, {
            y: "-100%",
            duration: 0.6,
            stagger: 0.05,
            ease: "power3.inOut",
          });
      });
    </script>
    <script
      type="module"
      src="../../assets/js/ensaios/cintiaGuilherme.js"
