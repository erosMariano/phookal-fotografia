<title>Contato</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.transition {
  position: fixed;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  z-index: 99999;
  pointer-events: none;
}

.col {
  background: #8f400d;
  height: 100vh;
  transform: translateY(0);
}

.transition img {
  position: absolute;
  z-index: 100000;
  width: 80%;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  opacity: 1; 
}
</style>
</head>

<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>


    <div class="menu-container">

      <div class="menu-trigger" id="menuTrigger">
        <span class="menu-label">Menu</span>
        <div class="hamburger-lines">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </div>
      </div>

      <!-- OVERLAY + PANEL -->
      <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
          <div class="close-btn" id="closeBtn"></div>

          <div class="side-images left">
            <img
              class="side-img active"
              id="left-0"
              src="./assets/img/trabalho_1.webp"
              alt=""
            />
            <img
              class="side-img"
              id="left-1"
              src="./assets/img/sobre_nos_1.webp"
              alt=""
            />
            <img
              class="side-img"

              src="./assets/img/contato_1.jpg"
              alt=""
            />
          </div>

          <div class="side-images right">
            <img
              class="side-img active"
              id="right-0"
              src="./assets/img/trabalhos_2.webp"
              alt=""
            />
            <img
              class="side-img"
              id="right-1"
              src="./assets/img/sobre_nos_2.webp"
              alt=""
            />
            <img
              class="side-img"
              id="right-2"
              src="./assets/img/contato_2.jpg"
              alt=""
            />
          </div>

          <div class="panel-line"></div>

          <nav class="nav-items">
            <a class="nav-item" data-index="0" href="#categorias"

    <img src="./assets/img/logo.svg" alt="">

    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>
    <div class="col"></div>

  <h1>Entrei na página de contato</h1>


  <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script type="module" src="./assets/js/contato.js"></script>
  <script>
  window.addEventListener("load", () => {
    const cols = document.querySelectorAll(".col");
    const logo = document.querySelector(".transition img");

    const tl = gsap.timeline();

    tl.to(logo, {
      opacity: 0,
      duration: 0.3,
      ease: "power2.in"
    })

    .to(cols, {
      y: "-100%",
      duration: 0.6,
      stagger: 0.05,
      ease: "power3.inOut"
    });
  });
  </script>

</body>
