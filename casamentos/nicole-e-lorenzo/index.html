    <script>
      window.addEventListener("load", () => {
        const cols = document.querySelectorAll(".col");
        const logo = document.querySelector(".transition img");

        const tl = gsap.timeline();

        tl.to(logo, {
          opacity: 0,
          duration: 0.3,
          ease: "power2.in",
        })

          .to(cols, {
            y: "-100%",
            duration: 0.6,
            stagger: 0.05,
            ease: "power3.inOut",
          });
      });
